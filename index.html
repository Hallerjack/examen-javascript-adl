<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Fernando Gonzalez Diaz">
    <meta name="Description" content="Conversor de monedas - Examen Módulo JS - Desarrollador Front End - Desafío LATAM">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Conversor de monedas</title>
</head>
<body>
    <header>
        <h1>Conversor de monedas nacional</h1>
    </header>
    <hr>
    <main>
        <div class="converter-container">
            <h3>Pesos CLP</h3>
            <input type="text">
            <label for="currency">Moneda a convertir:</label>
            <select name="currency" id="currency">
                <option value="">Dolar</option>
                <option value="">Euro</option>
                <option value="">Peso Argentino</option>
            </select>
            <button id="search">Buscar</button>
            <h3 id="result"></h3>
        </div>
        <div class="gráfica">
            <canvas id="myChart"></canvas>
        </div>
    </main>

    <script src="./assets/js/script.js"></script>
</body>
</html>
